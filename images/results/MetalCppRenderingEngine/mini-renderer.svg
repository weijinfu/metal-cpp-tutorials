<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 320" role="img" aria-label="Mini renderer result with textured mesh and directional light">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#263c43"/>
      <stop offset="1" stop-color="#0e1518"/>
    </linearGradient>
    <pattern id="checker" width="80" height="80" patternUnits="userSpaceOnUse" patternTransform="rotate(-8)">
      <rect width="40" height="40" fill="#eec469"/>
      <rect x="40" width="40" height="40" fill="#356882"/>
      <rect y="40" width="40" height="40" fill="#356882"/>
      <rect x="40" y="40" width="40" height="40" fill="#eec469"/>
    </pattern>
    <linearGradient id="light" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.28"/>
    </linearGradient>
  </defs>
  <rect width="512" height="320" fill="url(#bg)"/>
  <polygon points="112,78 424,102 386,246 88,226" fill="url(#checker)"/>
  <polygon points="112,78 424,102 386,246 88,226" fill="url(#light)"/>
  <polyline points="112,78 424,102 386,246 88,226 112,78 386,246" fill="none" stroke="#101819" stroke-opacity="0.65" stroke-width="3"/>
  <circle cx="138" cy="94" r="5" fill="#fff4c0" opacity="0.78"/>
  <text x="26" y="42" fill="#d8eadf" font-family="Georgia, serif" font-size="18">mesh + texture + light + camera</text>
</svg>
