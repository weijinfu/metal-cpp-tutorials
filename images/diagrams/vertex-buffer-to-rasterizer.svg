<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 340" role="img" aria-labelledby="title desc">
  <title id="title">Vertex buffer to rasterizer</title>
  <desc id="desc">Indexed vertices go through the vertex shader, rasterizer, fragment shader, and become pixels.</desc>
  <defs>
    <style>
      .bg{fill:#fffdf7}.box{fill:#f3ecdc;stroke:#1b211f;stroke-width:2}.stage{fill:#d9efe6}.pixel{fill:#d7e6f6}.txt{font:20px ui-monospace,Menlo,monospace;fill:#1b211f}.sub{font:15px ui-monospace,Menlo,monospace;fill:#68756f}.arrow{stroke:#0b6f5f;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#0b6f5f"/></marker>
  </defs>
  <rect class="bg" width="960" height="340"/>
  <rect class="box" x="35" y="90" width="155" height="145" rx="14"/>
  <text class="txt" x="70" y="135">Vertex</text>
  <text class="txt" x="73" y="163">Buffer</text>
  <text class="sub" x="62" y="195">pos normal uv</text>
  <rect class="box" x="235" y="90" width="155" height="145" rx="14"/>
  <text class="txt" x="279" y="135">Index</text>
  <text class="txt" x="276" y="163">Buffer</text>
  <text class="sub" x="279" y="195">0 1 2</text>
  <rect class="box stage" x="435" y="90" width="150" height="145" rx="14"/>
  <text class="txt" x="477" y="135">Vertex</text>
  <text class="txt" x="477" y="163">Shader</text>
  <text class="sub" x="467" y="195">MVP transform</text>
  <rect class="box stage" x="630" y="90" width="145" height="145" rx="14"/>
  <text class="txt" x="648" y="151">Rasterizer</text>
  <text class="sub" x="658" y="185">tri to pixels</text>
  <rect class="box pixel" x="820" y="90" width="110" height="145" rx="14"/>
  <text class="txt" x="850" y="151">Pixels</text>
  <text class="sub" x="845" y="185">fragments</text>
  <path class="arrow" d="M190 162 H227"/>
  <path class="arrow" d="M390 162 H427"/>
  <path class="arrow" d="M585 162 H622"/>
  <path class="arrow" d="M775 162 H812"/>
</svg>
