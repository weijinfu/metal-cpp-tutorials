<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 460" role="img">
  <rect width="1100" height="460" fill="#102a33"/>
  <style>
    .title{font:700 42px Georgia,serif;fill:#f3efe2}
    .label{font:700 28px Helvetica,Arial,sans-serif;fill:#f3efe2}
    .small{font:20px Helvetica,Arial,sans-serif;fill:#d7e3df}
    .mono{font:22px Menlo,Consolas,monospace;fill:#ffd88a}
    .box{fill:#173c45;stroke:#7ea9b1;stroke-width:3}
    .light{fill:#fffaf0;stroke:#d8d0c0;stroke-width:3}
    .gold{fill:#8d7047}
    .blue{fill:#34718a}
    .green{fill:#5b8f54}
    .line{stroke:#f3efe2;stroke-width:7;stroke-linecap:round}
    .accent{stroke:#ffd88a;stroke-width:7;stroke-linecap:round}
  </style>

  <text x="52" y="70" class="title">Lambert uses the angle to light</text>
  <circle cx="280" cy="270" r="115" class="gold"/>
  <path d="M280 270L280 105" class="line"/><path d="M280 270L455 180" class="accent"/>
  <text x="260" y="95" class="label">N</text><text x="470" y="185" class="label">L</text><text x="330" y="230" class="small">angle</text>
  <rect x="610" y="135" width="420" height="210" rx="22" class="box"/><text x="650" y="195" class="label">Diffuse term</text><text x="650" y="245" class="mono">max(N · L, 0)</text><text x="650" y="300" class="small">Small angle: brighter</text><text x="650" y="332" class="small">Large angle: darker</text>

</svg>
