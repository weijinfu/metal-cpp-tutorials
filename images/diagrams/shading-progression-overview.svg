<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1220 420" role="img">
  <rect width="1220" height="420" fill="#102a33"/>
  <style>
    .title{font:700 42px Georgia,serif;fill:#f3efe2}
    .label{font:700 28px Helvetica,Arial,sans-serif;fill:#f3efe2}
    .small{font:20px Helvetica,Arial,sans-serif;fill:#d7e3df}
    .mono{font:22px Menlo,Consolas,monospace;fill:#ffd88a}
    .box{fill:#173c45;stroke:#7ea9b1;stroke-width:3}
    .light{fill:#fffaf0;stroke:#d8d0c0;stroke-width:3}
    .gold{fill:#8d7047}
    .blue{fill:#34718a}
    .green{fill:#5b8f54}
    .line{stroke:#f3efe2;stroke-width:7;stroke-linecap:round}
    .accent{stroke:#ffd88a;stroke-width:7;stroke-linecap:round}
  </style>

  <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#ffd88a"/></marker></defs>
  <text x="44" y="58" class="title">Same renderer, richer shading</text>
  <text x="44" y="92" class="small">Geometry, camera, render pass, and draw call stay the same.</text>
  <rect x="42" y="142" width="245" height="230" rx="22" class="box"/><text x="72" y="190" class="label">1. Albedo</text><text x="72" y="240" class="mono">baseColor</text><text x="72" y="292" class="small">Check texture upload</text>
  <rect x="337" y="142" width="245" height="230" rx="22" class="box"/><text x="367" y="190" class="label">2. Lambert</text><text x="367" y="240" class="mono">N dot L</text><text x="367" y="292" class="small">Bright and dark sides</text>
  <rect x="632" y="142" width="245" height="230" rx="22" class="box"/><text x="662" y="190" class="label">3. Blinn</text><text x="662" y="240" class="mono">N dot H</text><text x="662" y="292" class="small">View-dependent highlight</text>
  <rect x="927" y="142" width="245" height="230" rx="22" class="box"/><text x="957" y="190" class="label">4. PBR</text><text x="957" y="240" class="mono">GGX + Fresnel</text><text x="957" y="292" class="small">Material maps</text>
  <path d="M287 257H325" class="accent" marker-end="url(#arrow)"/><path d="M582 257H620" class="accent" marker-end="url(#arrow)"/><path d="M877 257H915" class="accent" marker-end="url(#arrow)"/>

</svg>
