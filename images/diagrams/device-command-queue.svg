<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 470" role="img">
  <rect width="1120" height="470" fill="#102a33"/>
  <style>
    .title{font:700 42px Georgia,serif;fill:#f3efe2}
    .label{font:700 28px Helvetica,Arial,sans-serif;fill:#f3efe2}
    .small{font:20px Helvetica,Arial,sans-serif;fill:#d7e3df}
    .mono{font:22px Menlo,Consolas,monospace;fill:#ffd88a}
    .box{fill:#173c45;stroke:#7ea9b1;stroke-width:3}
    .light{fill:#fffaf0;stroke:#d8d0c0;stroke-width:3}
    .gold{fill:#8d7047}
    .blue{fill:#34718a}
    .green{fill:#5b8f54}
    .line{stroke:#f3efe2;stroke-width:7;stroke-linecap:round}
    .accent{stroke:#ffd88a;stroke-width:7;stroke-linecap:round}
  </style>

  <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#ffd88a"/></marker></defs>
  <text x="52" y="70" class="title">CPU submits work to Metal</text>
  <rect x="70" y="135" width="230" height="125" rx="22" class="box"/><text x="185" y="190" text-anchor="middle" class="label">CPU</text><text x="185" y="225" text-anchor="middle" class="small">encode commands</text>
  <rect x="390" y="115" width="300" height="165" rx="22" class="box"/><text x="540" y="175" text-anchor="middle" class="label">Command Queue</text><text x="540" y="215" text-anchor="middle" class="small">creates command buffers</text>
  <rect x="790" y="135" width="250" height="125" rx="22" class="box"/><text x="915" y="190" text-anchor="middle" class="label">GPU Device</text><text x="915" y="225" text-anchor="middle" class="small">executes work</text>
  <path d="M300 198H378" class="accent" marker-end="url(#arrow)"/>
  <path d="M690 198H778" class="accent" marker-end="url(#arrow)"/>
  <rect x="410" y="350" width="260" height="70" rx="14" class="box"/><text x="540" y="394" text-anchor="middle" class="mono">Command Buffer</text>
  <path d="M540 280V338" class="accent" marker-end="url(#arrow)"/>

</svg>
