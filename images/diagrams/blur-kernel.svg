<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 520" role="img">
  <rect width="1060" height="520" fill="#fffdf7"/>
  <style>
    .title{font:700 42px Georgia,serif;fill:#14201d}
    .label{font:700 28px Helvetica,Arial,sans-serif;fill:#f3efe2}
    .small{font:20px Helvetica,Arial,sans-serif;fill:#4f625c}
    .mono{font:22px Menlo,Consolas,monospace;fill:#ffd88a}
    .box{fill:#173c45;stroke:#7ea9b1;stroke-width:3}
    .light{fill:#fffaf0;stroke:#d8d0c0;stroke-width:3}
    .gold{fill:#8d7047}
    .blue{fill:#34718a}
    .green{fill:#5b8f54}
    .line{stroke:#f3efe2;stroke-width:7;stroke-linecap:round}
    .accent{stroke:#ffd88a;stroke-width:7;stroke-linecap:round}
  </style>

  <text x="52" y="70" class="title">Blur samples a 3x3 neighborhood</text>
  <g transform="translate(170 120)">
    <rect x="0" y="0" width="360" height="360" rx="18" class="light"/>
    <path d="M0 0V360" stroke="#d8d0c0" stroke-width="3"/>
<path d="M120 0V360" stroke="#d8d0c0" stroke-width="3"/>
<path d="M240 0V360" stroke="#d8d0c0" stroke-width="3"/>
<path d="M360 0V360" stroke="#d8d0c0" stroke-width="3"/>
    <path d="M0 0H360" stroke="#d8d0c0" stroke-width="3"/>
<path d="M0 120H360" stroke="#d8d0c0" stroke-width="3"/>
<path d="M0 240H360" stroke="#d8d0c0" stroke-width="3"/>
<path d="M0 360H360" stroke="#d8d0c0" stroke-width="3"/>
    <rect x="120" y="120" width="120" height="120" rx="12" fill="#0b6f5f"/>
    <text x="180" y="190" text-anchor="middle" class="label">center</text>
  </g>
  <rect x="650" y="150" width="310" height="220" rx="22" class="box"/>
  <text x="690" y="205" class="label">Weights</text>
  <text x="690" y="250" class="mono">1 2 1</text><text x="690" y="290" class="mono">2 4 2</text><text x="690" y="330" class="mono">1 2 1</text>

</svg>
