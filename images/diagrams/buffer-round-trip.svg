<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 460" role="img">
  <rect width="1160" height="460" fill="#102a33"/>
  <style>
    .title{font:700 42px Georgia,serif;fill:#f3efe2}
    .label{font:700 28px Helvetica,Arial,sans-serif;fill:#f3efe2}
    .small{font:20px Helvetica,Arial,sans-serif;fill:#d7e3df}
    .mono{font:22px Menlo,Consolas,monospace;fill:#ffd88a}
    .box{fill:#173c45;stroke:#7ea9b1;stroke-width:3}
    .light{fill:#fffaf0;stroke:#d8d0c0;stroke-width:3}
    .gold{fill:#8d7047}
    .blue{fill:#34718a}
    .green{fill:#5b8f54}
    .line{stroke:#f3efe2;stroke-width:7;stroke-linecap:round}
    .accent{stroke:#ffd88a;stroke-width:7;stroke-linecap:round}
  </style>

  <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#ffd88a"/></marker></defs>
  <text x="52" y="70" class="title">A buffer round trip</text>
  <rect x="80" y="140" width="250" height="145" rx="22" class="box"/><text x="205" y="190" text-anchor="middle" class="label">CPU writes</text><text x="205" y="235" text-anchor="middle" class="mono">1 2 3 4</text>
  <rect x="455" y="140" width="250" height="145" rx="22" class="box"/><text x="580" y="190" text-anchor="middle" class="label">GPU kernel</text><text x="580" y="235" text-anchor="middle" class="mono">value *= 2</text>
  <rect x="830" y="140" width="250" height="145" rx="22" class="box"/><text x="955" y="190" text-anchor="middle" class="label">CPU reads</text><text x="955" y="235" text-anchor="middle" class="mono">2 4 6 8</text>
  <path d="M330 212H443" class="accent" marker-end="url(#arrow)"/>
  <path d="M705 212H818" class="accent" marker-end="url(#arrow)"/>
  <text x="580" y="400" text-anchor="middle" class="small">The same shared buffer is visible to both CPU and GPU.</text>

</svg>
