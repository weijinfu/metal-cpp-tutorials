<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" role="img" aria-labelledby="title desc">
  <title id="title">Window layer drawable chain</title>
  <desc id="desc">NSWindow owns an NSView, the view owns a CAMetalLayer, and the layer provides CAMetalDrawable objects.</desc>
  <defs>
    <style>
      .bg{fill:#fffdf7}.box{fill:#f3ecdc;stroke:#1b211f;stroke-width:2}.metal{fill:#d9efe6}.gpu{fill:#d7e6f6}.txt{font:22px ui-monospace,Menlo,monospace;fill:#1b211f}.sub{font:16px ui-monospace,Menlo,monospace;fill:#68756f}.arrow{stroke:#0b6f5f;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0b6f5f"/>
    </marker>
  </defs>
  <rect class="bg" width="960" height="300"/>
  <rect class="box" x="50" y="80" width="170" height="120" rx="14"/>
  <text class="txt" x="82" y="135">NSWindow</text>
  <text class="sub" x="86" y="166">owns the view</text>
  <rect class="box" x="285" y="80" width="170" height="120" rx="14"/>
  <text class="txt" x="335" y="135">NSView</text>
  <text class="sub" x="318" y="166">wantsLayer = YES</text>
  <rect class="box metal" x="520" y="80" width="190" height="120" rx="14"/>
  <text class="txt" x="548" y="135">CAMetalLayer</text>
  <text class="sub" x="558" y="166">nextDrawable()</text>
  <rect class="box gpu" x="775" y="80" width="145" height="120" rx="14"/>
  <text class="txt" x="795" y="135">Drawable</text>
  <text class="sub" x="800" y="166">texture target</text>
  <path class="arrow" d="M220 140 H278"/>
  <path class="arrow" d="M455 140 H512"/>
  <path class="arrow" d="M710 140 H767"/>
</svg>
